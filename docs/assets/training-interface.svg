  <rect x="50" y="224" width="210" height="48" rx="8" fill="#f9fafb" stroke="#d0d5dd"/>
  <circle cx="76" cy="248" r="8" fill="#d0d5dd"/>
  <text x="96" y="253" font-family="Arial, sans-serif" font-size="14" fill="#1d2129">Segmentation YOLO11m</text>
  <text x="50" y="330" font-family="Arial, sans-serif" font-size="15" font-weight="700" fill="#1d2129">Dataset</text>
  <rect x="50" y="356" width="210" height="88" rx="8" fill="#f9fafb" stroke="#eaecf0"/>
  <text x="68" y="386" font-family="Arial, sans-serif" font-size="13" fill="#344054">datasets/classification</text>
  <text x="68" y="414" font-family="Arial, sans-serif" font-size="13" fill="#12b76a">Structure verified</text>
  <rect x="50" y="570" width="96" height="40" rx="6" fill="#165dff"/>
  <text x="74" y="595" font-family="Arial, sans-serif" font-size="14" fill="#ffffff">Start</text>
  <rect x="164" y="570" width="96" height="40" rx="6" fill="#f2f4f7" stroke="#d0d5dd"/>
