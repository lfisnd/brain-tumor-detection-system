  <rect x="330" y="94" width="390" height="590" rx="8" fill="#ffffff" stroke="#dfe5ef"/>
  <text x="356" y="130" font-family="Arial, sans-serif" font-size="15" font-weight="700" fill="#1d2129">Hyperparameters</text>
