    <text x="516" y="179">100</text>
    <text x="516" y="239">4</text>
    <text x="516" y="299">640</text>
    <text x="516" y="359">0.01</text>
    <text x="516" y="419">SGD</text>
    <text x="516" y="479">CUDA / CPU</text>
  </g>
  <rect x="356" y="548" width="102" height="42" rx="6" fill="#f2f4f7" stroke="#d0d5dd"/>
  <text x="382" y="574" font-family="Arial, sans-serif" font-size="14" fill="#344054">Default</text>
  <rect x="478" y="548" width="102" height="42" rx="6" fill="#f2f4f7" stroke="#d0d5dd"/>
  <text x="504" y="574" font-family="Arial, sans-serif" font-size="14" fill="#344054">Fast</text>
  <rect x="600" y="548" width="102" height="42" rx="6" fill="#f2f4f7" stroke="#d0d5dd"/>
  <text x="616" y="574" font-family="Arial, sans-serif" font-size="14" fill="#344054">Accurate</text>

  <rect x="746" y="94" width="510" height="590" rx="8" fill="#ffffff" stroke="#dfe5ef"/>
  <text x="772" y="130" font-family="Arial, sans-serif" font-size="15" font-weight="700" fill="#1d2129">Training Monitor</text>
  <rect x="772" y="158" width="436" height="18" rx="9" fill="#d0d5dd"/>
  <rect x="772" y="158" width="286" height="18" rx="9" fill="#12b76a"/>
  <text x="1220" y="174" text-anchor="end" font-family="Arial, sans-serif" font-size="13" fill="#344054">65%</text>
  <rect x="772" y="206" width="436" height="170" rx="8" fill="#101828"/>
  <g font-family="Consolas, monospace" font-size="13" fill="#d0d5dd">
    <text x="792" y="238">[INFO] Loading model: yolo11n.pt</text>
    <text x="792" y="268">[INFO] Dataset: datasets/classification/icon.yaml</text>
    <text x="792" y="298">Epoch 65/100 | loss 0.312 | mAP50 0.941</text>
    <text x="792" y="328">Saving checkpoint to results/classification/train</text>
  </g>
  <rect x="772" y="410" width="436" height="210" rx="8" fill="#f9fafb" stroke="#eaecf0"/>
  <polyline points="808,570 858,548 908,520 958,485 1008,454 1058,430 1108,418 1168,392" fill="none" stroke="#165dff" stroke-width="4"/>
  <polyline points="808,460 858,472 908,466 958,438 1008,428 1058,410 1108,394 1168,382" fill="none" stroke="#f79009" stroke-width="4"/>
  <text x="808" y="446" font-family="Arial, sans-serif" font-size="13" fill="#165dff">mAP50</text>
  <text x="808" y="596" font-family="Arial, sans-serif" font-size="13" fill="#f79009">loss</text>
