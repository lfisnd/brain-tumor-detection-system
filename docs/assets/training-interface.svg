    <text x="356" y="178">Epochs</text>
    <text x="356" y="238">Batch size</text>
    <text x="356" y="298">Image size</text>
    <text x="356" y="358">Learning rate</text>
    <text x="356" y="418">Optimizer</text>
    <text x="356" y="478">Device</text>
  </g>
  <g fill="#f9fafb" stroke="#d0d5dd">
    <rect x="492" y="154" width="178" height="38" rx="6"/>
    <rect x="492" y="214" width="178" height="38" rx="6"/>
    <rect x="492" y="274" width="178" height="38" rx="6"/>
    <rect x="492" y="334" width="178" height="38" rx="6"/>
    <rect x="492" y="394" width="178" height="38" rx="6"/>
    <rect x="492" y="454" width="178" height="38" rx="6"/>
  </g>
