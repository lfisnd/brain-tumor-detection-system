<svg width="1280" height="720" viewBox="0 0 1280 720" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Training interface preview</title>
  <desc id="desc">A safe illustrative preview of the model training GUI layout.</desc>
  <rect width="1280" height="720" fill="#f6f8fb"/>
  <rect x="0" y="0" width="1280" height="70" fill="#ffffff"/>
  <rect x="0" y="69" width="1280" height="1" fill="#dfe5ef"/>
  <circle cx="44" cy="35" r="17" fill="#12b76a"/>
  <text x="76" y="31" font-family="Arial, sans-serif" font-size="22" font-weight="700" fill="#1d2129">Model Training Console</text>
  <text x="76" y="52" font-family="Arial, sans-serif" font-size="13" fill="#667085">Configure YOLO11 classification and segmentation training</text>

  <rect x="24" y="94" width="280" height="590" rx="8" fill="#ffffff" stroke="#dfe5ef"/>
  <text x="50" y="130" font-family="Arial, sans-serif" font-size="15" font-weight="700" fill="#1d2129">Task Selection</text>
